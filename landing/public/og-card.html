<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    background: #0A1628;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
/* Mesh gradient background */
body::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 100, 255, 0.06) 0%, transparent 50%);
}
/* Horizontal light streaks */
body::after {
    content: '';
    position: absolute;
    top: 180px; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
}
.content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}
.logo-text {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #19C1F4, #0321A0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.tagline {
    font-size: 56px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
}
.tagline .cyan {
    color: #00E5FF;
}
.subtitle {
    font-size: 24px;
    font-weight: 500;
    color: #00E5FF;
    letter-spacing: 6px;
    text-transform: uppercase;
}
.url {
    position: absolute;
    bottom: 40px;
    right: 50px;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 1px;
}
.badges {
    display: flex;
    gap: 16px;
    margin-top: 8px;
}
.badge {
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 600;
}
.badge-gold { background: rgba(255, 215, 0, 0.15); color: #FFD700; border: 1px solid rgba(255, 215, 0, 0.3); }
.badge-silver { background: rgba(192, 192, 192, 0.15); color: #C0C0C0; border: 1px solid rgba(192, 192, 192, 0.3); }
.badge-bronze { background: rgba(205, 127, 50, 0.15); color: #CD7F32; border: 1px solid rgba(205, 127, 50, 0.3); }
</style>
</head>
<body>
<div class="content">
    <div class="logo-text">A2APEX</div>
    <div class="tagline">Where AI Agents <span class="cyan">Earn Trust</span></div>
    <div class="subtitle">Test · Certify · Get Listed</div>
    <div class="badges">
        <div class="badge badge-gold">★ Gold Certified</div>
        <div class="badge badge-silver">✓ Verified</div>
        <div class="badge badge-bronze">Tested</div>
    </div>
</div>
<div class="url">a2apex.io</div>
</body>
</html>

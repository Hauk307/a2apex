<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0a0a0a; margin: 0; padding: 40px; font-family: 'Inter', -apple-system, sans-serif; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; max-width: 900px; margin: 0 auto; }
  .logo-card { background: #111; border-radius: 20px; padding: 40px; text-align: center; border: 1px solid #222; }
  .logo-card h3 { color: #888; font-size: 14px; margin-top: 20px; font-weight: 400; }
  .logo-card:last-child { grid-column: 1 / -1; max-width: 420px; margin: 0 auto; width: 100%; }
  h1 { color: white; text-align: center; font-size: 24px; margin-bottom: 40px; }

  /* Logo 1: The Peak — Triangle A with gradient */
  .logo1 svg { width: 160px; height: 80px; }
  
  /* Logo 2: Connected Nodes */
  .logo2 svg { width: 200px; height: 80px; }
  
  /* Logo 3: Shield Badge */  
  .logo3 svg { width: 180px; height: 80px; }
  
  /* Logo 4: Circuit A */
  .logo4 svg { width: 180px; height: 80px; }
  
  /* Logo 5: Hexagonal Seal */
  .logo5 svg { width: 180px; height: 80px; }
</style>
</head>
<body>
<h1>A2Apex Logo Concepts</h1>
<div class="grid">

<!-- LOGO 1: The Peak -->
<div class="logo-card">
  <svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#7c3aed"/>
        <stop offset="100%" style="stop-color:#4f46e5"/>
      </linearGradient>
    </defs>
    <!-- Triangle/Peak shape -->
    <polygon points="45,85 75,20 105,85" fill="url(#g1)" />
    <!-- Horizontal line through triangle = "A" crossbar -->
    <line x1="52" y1="60" x2="98" y2="60" stroke="#0a0a0a" stroke-width="5"/>
    <!-- Small triangle cutout at top for "apex" feel -->
    <text x="120" y="65" font-family="Inter, sans-serif" font-weight="700" font-size="42" fill="white">2Apex</text>
  </svg>
  <h3>1. "The Peak" — Bold triangle A, apex energy</h3>
</div>

<!-- LOGO 2: Connected Nodes -->
<div class="logo-card">
  <svg viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#7c3aed"/>
        <stop offset="100%" style="stop-color:#06b6d4"/>
      </linearGradient>
    </defs>
    <!-- Two agent nodes connected -->
    <circle cx="35" cy="50" r="16" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <text x="29" y="56" font-family="Inter" font-weight="700" font-size="16" fill="#7c3aed">A</text>
    <line x1="51" y1="50" x2="75" y2="50" stroke="url(#g2)" stroke-width="3" stroke-dasharray="4,3"/>
    <circle cx="91" cy="50" r="16" fill="none" stroke="#06b6d4" stroke-width="3"/>
    <text x="85" y="56" font-family="Inter" font-weight="700" font-size="16" fill="#06b6d4">A</text>
    <!-- Checkmark between -->
    <path d="M 58 40 L 63 46 L 72 34" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <text x="120" y="62" font-family="Inter, sans-serif" font-weight="700" font-size="38" fill="white">A2Apex</text>
  </svg>
  <h3>2. "The Handshake" — Two agents verified</h3>
</div>

<!-- LOGO 3: Shield -->
<div class="logo-card">
  <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#7c3aed"/>
        <stop offset="100%" style="stop-color:#4f46e5"/>
      </linearGradient>
    </defs>
    <!-- Shield shape -->
    <path d="M 50 18 L 85 10 L 120 18 L 120 60 Q 120 90 85 100 Q 50 90 50 60 Z" fill="url(#g3)" opacity="0.9"/>
    <!-- A2 inside shield -->
    <text x="67" y="55" font-family="Inter" font-weight="800" font-size="22" fill="white">A2</text>
    <!-- Checkmark below -->
    <path d="M 72 68 L 80 78 L 98 58" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <text x="135" y="65" font-family="Inter, sans-serif" font-weight="700" font-size="40" fill="white">A2<tspan fill="#7c3aed">Apex</tspan></text>
  </svg>
  <h3>3. "The Shield" — Trust & certification</h3>
</div>

<!-- LOGO 4: Minimal/Clean -->
<div class="logo-card">
  <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#7c3aed"/>
        <stop offset="50%" style="stop-color:#6366f1"/>
        <stop offset="100%" style="stop-color:#06b6d4"/>
      </linearGradient>
    </defs>
    <!-- Clean rounded square with A -->
    <rect x="20" y="20" width="70" height="70" rx="18" fill="url(#g4)"/>
    <!-- Stylized A with apex point -->
    <path d="M 55 32 L 38 75 M 55 32 L 72 75 M 43 63 L 67 63" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Small dot at apex -->
    <circle cx="55" cy="30" r="3" fill="#22c55e"/>
    <text x="105" y="68" font-family="Inter, sans-serif" font-weight="600" font-size="36" fill="white">A2<tspan font-weight="800" fill="#7c3aed">Apex</tspan></text>
  </svg>
  <h3>4. "The App Icon" — Clean, modern, minimal</h3>
</div>

<!-- LOGO 5: Hexagonal Stamp -->
<div class="logo-card">
  <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#f59e0b"/>
        <stop offset="100%" style="stop-color:#ef4444"/>
      </linearGradient>
    </defs>
    <!-- Hexagonal seal/badge -->
    <polygon points="55,12 88,28 88,62 55,78 22,62 22,28" fill="none" stroke="url(#g5)" stroke-width="3"/>
    <polygon points="55,22 80,34 80,56 55,68 30,56 30,34" fill="url(#g5)" opacity="0.15"/>
    <!-- Checkmark inside -->
    <path d="M 40 46 L 50 58 L 72 34" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <text x="105" y="56" font-family="Inter, sans-serif" font-weight="800" font-size="36" fill="white">A2</text>
    <text x="105" y="80" font-family="Inter, sans-serif" font-weight="300" font-size="22" fill="#f59e0b" letter-spacing="8">APEX</text>
  </svg>
  <h3>5. "The Seal" — Certification stamp, bold colors</h3>
</div>

</div>
</body>
</html>
